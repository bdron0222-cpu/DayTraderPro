name: Daily Stock Scan
on:
  schedule:
    - cron: '0 6 * * *' # UTC 06:00 = 台灣時間 14:00 (自動掃描)
  workflow_dispatch:    # 允許您隨時手動觸發測試

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必須給予寫入權限，才能存回 candidates.json
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Scanner
        run: python main.py
      - name: Commit and Push results
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add candidates.json
          git commit -m "Update scan results" || echo "No changes to commit"
          git push