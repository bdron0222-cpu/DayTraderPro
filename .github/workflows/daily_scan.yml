name: Daily Stock Scan

on:
  schedule:
    - cron: '50 6 * * *' 
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # [修正順序] 先安裝依賴，才能執行 Python 腳本
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 再執行更新腳本
      - name: Update stock list if needed
        run: python check_and_update_stocks.py

      # 最後執行掃描
      - name: Run scanner
        run: |
          python main.py --strategy shooting_star --output candidates_shooting_star.json
          python main.py --strategy ma_breakdown --output candidates_ma_breakdown.json

      - name: Commit results
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add candidates_shooting_star.json candidates_ma_breakdown.json stocks.json update_metadata.json
          git commit -m "Update stock data: $(date +'%Y-%m-%d')" || exit 0
          git push
