name: Daily Stock Scan

on:
  schedule:
    # 改為 06:50 UTC (台灣時間 14:50)，避開整點排隊延遲
    - cron: '50 6 * * *' 
  workflow_dispatch: # 允許你手動測試

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允許 GitHub Action 將更新後的檔案推回儲存庫
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # 檢查並更新股票清單
      - name: Update stock list if needed
        run: python check_and_update_stocks.py

      - name: Install dependencies
        run: pip install -r requirements.txt

      # [新增] 執行射擊之星掃描
      - name: Run Shooting Star Scanner
        run: python main.py --strategy shooting_star --output candidates_shooting_star.json

      # [新增] 執行均線破位掃描
      - name: Run MA Breakdown Scanner
        run: python main.py --strategy ma_breakdown --output candidates_ma_breakdown.json

      # 自動 Commit 更新後的結果與清單
      - name: Commit results
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # 將兩個策略的結果檔、清單檔與 metadata 全部加入儲存庫
          git add candidates_shooting_star.json candidates_ma_breakdown.json stocks.json update_metadata.json
          
          # 如果有變更才 commit
          git commit -m "Update stock data: $(date +'%Y-%m-%d')" || exit 0
          
          # 推送到儲存庫
          git push