name: Daily Stock Scan

on:
  schedule:
    # 設定 UTC 時間 06:50 (對應台灣時間下午 2:50)
    - cron: '50 6 * * *' 
  workflow_dispatch: # 允許手動測試

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允許 GitHub Action 將更新後的檔案推回儲存庫
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # 1. 先安裝套件 (這一步最關鍵，沒先裝會報錯)
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 2. 檢查並更新股票清單
      - name: Update stock list if needed
        run: python check_and_update_stocks.py

      # 3. 執行射擊之星掃描
      - name: Run Shooting Star Scanner
        run: python main.py --strategy shooting_star --output candidates_shooting_star.json

      # 4. 執行均線破位掃描
      - name: Run MA Breakdown Scanner
        run: python main.py --strategy ma_breakdown --output candidates_ma_breakdown.json

      # 5. 安全地提交結果
      - name: Commit results
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # 檢查檔案是否存在，存在才 add (避免找不到檔案報錯)
          [ -f candidates_shooting_star.json ] && git add candidates_shooting_star.json
          [ -f candidates_ma_breakdown.json ] && git add candidates_ma_breakdown.json
          [ -f stocks.json ] && git add stocks.json
          [ -f update_metadata.json ] && git add update_metadata.json
          
          # 如果有變更才 commit，避免沒有資料更新時產生報錯
          git commit -m "Update stock data: $(date +'%Y-%m-%d')" || exit 0
          
          # 推送到儲存庫
          git push
