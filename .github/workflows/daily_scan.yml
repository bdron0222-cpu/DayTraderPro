name: Daily Stock Scan

on:
  schedule:
    # 設定 UTC 時間 07:00 (對應台灣時間下午 3:00)
    - cron: '0 7 * * *' 
  workflow_dispatch: # 允許你手動測試

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允許 GitHub Action 將更新後的檔案推回儲存庫
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # [新增] 檢查並更新股票清單 (如果超過 90 天)
      - name: Update stock list if needed
        run: python check_and_update_stocks.py

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 執行掃描
      - name: Run scanner
        run: python main.py

      # 自動 Commit 更新後的結果檔案與清單
      - name: Commit results
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          # 將所有生成的資料檔加入儲存庫
          git add results.csv results.json stocks.json
          # 如果有變更才 commit，避免沒有資料更新時產生報錯
          git commit -m "Update stock data: $(date +'%Y-%m-%d')" || exit 0
          git push